name: rds-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # Web framework
      - flask==3.1.0
      - flask-cors==5.0.0
      # Scraping
      - scrapling[fetchers]==0.3.6
      - feedparser==6.0.11
      - trafilatura==2.0.0
      - httpx==0.28.1
      - duckduckgo-search==6.3.7
      - googlesearch-python==1.2.5
      # Preprocessing (no ML models)
      - langdetect==1.0.9
      - cleantext==1.1.4
      # Utilities
      - pyyaml==6.0.2
      - python-dotenv==1.0.1
      - loguru==0.7.3
      # Testing
      - pytest==8.3.4
