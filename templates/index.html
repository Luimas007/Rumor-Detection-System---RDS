<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RDS — Web Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════════════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-mark">◈</span>
      <div>
        <span class="logo-title">RDS Scraper</span>
        <span class="logo-sub">Rumor Detection System — Data Collection</span>
      </div>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-view="search">Search</button>
      <button class="nav-btn" data-view="history">History</button>
    </nav>
  </div>
</header>

<!-- ═══ MAIN ══════════════════════════════════════════════════════════════════ -->
<main>

  <!-- ── SEARCH VIEW ── -->
  <section id="view-search" class="view active">

    <!-- Hero / search bar -->
    <div class="hero">
      <h1 class="hero-title">Search &amp; Scrape</h1>
      <p class="hero-sub">Collect articles from multiple news sources, clean the content, and review results.</p>

      <form id="search-form" autocomplete="off">
        <div class="search-row">
          <input type="text" id="search-input" class="search-input"
                 placeholder="Enter a topic, claim, or keyword…" maxlength="500" required/>
          <button type="submit" id="search-btn" class="btn-primary">Scrape</button>
        </div>

        <!-- Source checkboxes -->
        <div class="source-row" id="source-checkboxes">
          <!-- populated by JS from /api/sources -->
        </div>

        <div class="options-row">
          <label class="opt-label">Max articles
            <select id="max-articles" class="select-sm">
              <option value="20">20</option>
              <option value="40" selected>40</option>
              <option value="60">60</option>
              <option value="100">100</option>
            </select>
          </label>
        </div>
      </form>
    </div>

    <!-- Phase progress -->
    <div id="progress-panel" class="progress-panel hidden">
      <div class="phases">
        <div class="phase" id="phase-1">
          <span class="phase-dot"></span>
          <span class="phase-label">Source Search</span>
        </div>
        <div class="phase-arrow">→</div>
        <div class="phase" id="phase-2">
          <span class="phase-dot"></span>
          <span class="phase-label">Article Fetch</span>
        </div>
        <div class="phase-arrow">→</div>
        <div class="phase" id="phase-3">
          <span class="phase-dot"></span>
          <span class="phase-label">Preprocess</span>
        </div>
      </div>
      <div id="progress-msg" class="progress-msg"></div>
    </div>

    <!-- Stats bar -->
    <div id="stats-bar" class="stats-bar hidden">
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- Toolbar -->
    <div id="results-toolbar" class="results-toolbar hidden">
      <div class="toolbar-left">
        <span id="result-count" class="result-count"></span>
        <span id="result-query" class="result-query"></span>
      </div>
      <div class="toolbar-right">
        <input type="text" id="filter-input" class="filter-input" placeholder="Filter titles…"/>
        <label class="opt-label">Source
          <select id="source-filter" class="select-sm">
            <option value="">All</option>
          </select>
        </label>
        <label class="opt-label">Mode
          <select id="mode-filter" class="select-sm">
            <option value="">All</option>
            <option value="full">Full article</option>
            <option value="snippet_only">Snippet only</option>
          </select>
        </label>
        <label class="opt-label">Sort
          <select id="sort-select" class="select-sm">
            <option value="date">Newest first</option>
            <option value="words_desc">Most words</option>
            <option value="words_asc">Fewest words</option>
          </select>
        </label>
      </div>
    </div>

    <!-- Article grid -->
    <div id="articles-grid" class="articles-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <p>No articles matched. Try a different query or enable more sources.</p>
    </div>

  </section>

  <!-- ── HISTORY VIEW ── -->
  <section id="view-history" class="view">
    <div class="page-wrap">
      <div class="page-header">
        <h2>Search History</h2>
        <button id="refresh-history" class="btn-ghost">↻ Refresh</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </section>

</main>

<!-- ═══ ARTICLE MODAL ═══════════════════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
