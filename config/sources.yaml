sources:
  google_news:
    enabled: true
    priority: 1
    max_results: 15
    url_template: "https://news.google.com/rss/search?q={query}&hl=en-US&gl=US&ceid=US:en"
    type: rss
    description: "Google News RSS feed"

  bing_news:
    enabled: true
    priority: 2
    max_results: 10
    url_template: "https://www.bing.com/news/search?q={query}&format=RSS"
    type: rss
    description: "Bing News RSS feed"

  reddit:
    enabled: true
    priority: 3
    max_results: 10
    url_template: "https://www.reddit.com/search.json?q={query}&sort=relevance&type=link&t=month&limit=15"
    type: json_api
    description: "Reddit search results"
    user_agent: "RDS/1.0 (Rumor Detection System; research)"

