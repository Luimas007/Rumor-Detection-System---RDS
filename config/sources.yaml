sources:
  google_news:
    category: news
    enabled: true
    max_results: 30

  bing_news:
    category: news
    enabled: true
    max_results: 30

  reddit:
    category: social   # displayed separately as Social Discussions
    enabled: true
    max_results: 25

  hackernews:
    category: news
    enabled: true
    max_results: 25

  duckduckgo:
    category: news
    enabled: true
    max_results: 30
    timelimit: "m"    # d=day, w=week, m=month, y=year

  google_web:
    category: news
    enabled: true
    max_results: 20
    sleep_interval: 1.0   # seconds between results -- increase if Google blocks you
    timeout: 10
    lang: "en"
    # Note: Google may rate-limit this source. If you get blocked,
    # set enabled: false and rely on google_news + portals instead.

  portals:
    category: news
    enabled: true
    max_results: 250     # total cap across all feeds
    max_per_feed: 25     # articles fetched per feed BEFORE keyword filter (was 6 -- too low)
    max_workers: 20      # concurrent feed fetches
    feeds:
      # ── General / World News ──────────────────────────────────────────────────
      - name: "BBC News"
        rss_url: "https://feeds.bbci.co.uk/news/rss.xml"
        category: general
        enabled: true

      - name: "BBC World"
        rss_url: "https://feeds.bbci.co.uk/news/world/rss.xml"
        category: general
        enabled: true

      - name: "Reuters"
        rss_url: "https://feeds.reuters.com/reuters/topNews"
        category: general
        enabled: true

      - name: "Reuters Business"
        rss_url: "https://feeds.reuters.com/reuters/businessNews"
        category: business
        enabled: true

      - name: "AP News"
        rss_url: "https://apnews.com/index.rss"
        category: general
        enabled: true

      - name: "The Guardian"
        rss_url: "https://www.theguardian.com/world/rss"
        category: general
        enabled: true

      - name: "Al Jazeera"
        rss_url: "https://www.aljazeera.com/xml/rss/all.xml"
        category: general
        enabled: true

      - name: "NPR News"
